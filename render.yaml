# Next.js must run as a Web Service (Node), not a Static Site.
# Static Site "Publish directory: build" fails because Next outputs .next/, not build/.
services:
  - type: web
    name: mythic-plus-party-shuffle-ui
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    # NEXT_PUBLIC_* is inlined at build time — must be set before `next build`, not only at runtime.
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.mythic-plus-party-shuffle.ca
